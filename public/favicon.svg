<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#171a17"/>
            <stop offset="1" stop-color="#080a09"/>
        </linearGradient>
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="64" height="64" rx="12" fill="url(#surface)"/>
    <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#eceee6" stroke-opacity="0.16" stroke-width="2"/>
    <text
        x="32"
        y="40"
        text-anchor="middle"
        fill="#eceee6"
        font-family="Manrope, Arial Black, Arial, sans-serif"
        font-size="30"
        font-weight="900"
        letter-spacing="-2.8"
    >JR</text>
    <rect x="15" y="48" width="34" height="4" rx="2" fill="#b9ff5c" filter="url(#glow)"/>
    <circle cx="51" cy="13" r="3" fill="#b9ff5c" filter="url(#glow)"/>
</svg>
